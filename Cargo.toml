[package]
name = "stateset-api"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-web = "4.0"
actix-cors = { version = "0.6.0-beta.10" }
juniper = "0.15"
juniper_actix = "0.6"
jsonwebtoken = "8.0"
diesel = { version = "2.0", features = ["postgres", "r2d2", "chrono"] }
dotenv = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dsl_auto_type = "0.1.2"
diesel_table_macro_syntax = "0.2.0"
diesel_derives = "2.2.2"
prost = "0.11"
redis = "0.21.5"
lru = "0.7.8"
tonic = "0.8"
tonic-web = "0.5"
validator = "0.18.1"

[build-dependencies]
tonic-build = "0.8"
