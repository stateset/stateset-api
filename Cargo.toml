[package]
name = "stateset-api"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
async-graphql = "4.0"
async-trait = "0.1.81"
tokio = { version = "1.34.0", features = ["full"] }
axum = "0.7.1"
axum-macros = "0.3"
chrono = { version = "0.4.26", features = ["serde"] }
tower = "0.4.13"
tower-http = { version = "0.5.0", features = ["fs"] }
juniper = "0.15"
juniper_actix = "0.6"
jsonwebtoken = "8.0"
dotenv = "0.15"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dsl_auto_type = "0.1.2"
prost = "0.11"
redis = "0.21.5"
lazy_static = "1.4"
lru = "0.7.8"
tonic = "0.8"
tonic-web = "0.5"
validator = { version = "0.14", features = ["derive"] }
thiserror = "1.0"
uuid = { version = "1.4", features = ["fast-rng", "v4", "serde"] }
sea-orm = "1.0.0"

[build-dependencies]
tonic-build = "0.8"
